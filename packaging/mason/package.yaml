# Mason package definition.
#
# To publish: copy this file to mason-org/mason-registry as
# packages/oapi-lsp/package.yaml and open a PR. Validate locally first with the
# registry's checks (see CONTRIBUTING in that repo). The `file:` names must match
# the GoReleaser archive name_template in .goreleaser.yaml exactly.
name: oapi-lsp
description: |
  Language server for OpenAPI/Swagger YAML specs. Provides go-to-definition and
  find-references on $ref (internal and cross-file), plus document and workspace
  symbols for operations and components. Runs alongside yaml-language-server.
homepage: https://github.com/stardustcrsd3r/oapi-language-server
licenses:
  - MIT
languages:
  - YAML
categories:
  - LSP
source:
  id: pkg:github/stardustcrsd3r/oapi-language-server@{{ version }}
  asset:
    - target: darwin_arm64
      file: oapi-lsp_darwin_arm64.tar.gz
      bin: oapi-lsp
    - target: darwin_x64
      file: oapi-lsp_darwin_amd64.tar.gz
      bin: oapi-lsp
    - target: linux_arm64
      file: oapi-lsp_linux_arm64.tar.gz
      bin: oapi-lsp
    - target: linux_x64
      file: oapi-lsp_linux_amd64.tar.gz
      bin: oapi-lsp
    - target: win_arm64
      file: oapi-lsp_windows_arm64.zip
      bin: oapi-lsp.exe
    - target: win_x64
      file: oapi-lsp_windows_amd64.zip
      bin: oapi-lsp.exe
bin:
  oapi-lsp: "{{ source.asset.bin }}"
